<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========== OVERLAYS & MODALS ========== -->

    <!-- Image Lightbox -->
    <div id="imageLightbox" class="lightbox" style="display:none">
        <button class="lightbox-close" id="closeLightbox">✕</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="ctx-item" id="ctxReply">↩ Ответить</div>
        <div class="ctx-item" id="ctxCopy">📋 Копировать</div>
        <div class="ctx-item" id="ctxForward">↪ Переслать</div>
        <div class="ctx-item" id="ctxPin">📌 Закрепить</div>
        <div class="ctx-item ctx-edit" id="ctxEdit">✏️ Редактировать</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item ctx-danger" id="ctxDelete">🗑️ Удалить</div>
    </div>

    <!-- Forward Modal -->
    <div id="forwardModal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span>Переслать сообщение</span>
                <button id="closeForwardModal" class="btn-icon">✕</button>
            </div>
            <div id="forwardContactsList" class="forward-contacts"></div>
        </div>
    </div>

    <!-- Emoji Picker -->
    <div id="emojiPicker" class="emoji-picker" style="display:none"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ========== APP ========== -->
    <div id="appScreen" class="app-container">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="my-profile">
                    <div class="avatar-wrap">
                        <img id="myAvatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" class="avatar" alt="">
                        <span class="online-dot my-dot"></span>
                    </div>
                    <div class="my-info">
                        <span id="myName" class="my-name">Подключение...</span>
                        <span class="my-status">В сети</span>
                    </div>
                </div>
                <div class="header-btns">
                    <button id="themeToggleBtn" class="btn-icon" title="Тема">🌙</button>
                    <button id="googleLoginBtn" class="btn-icon google-btn" title="Войти через Google" style="display:none">G</button>
                    <button id="logoutBtn" class="btn-icon" title="Выйти" style="display:none">🚪</button>
                </div>
            </div>

            <div class="sidebar-search">
                <span class="search-icon-lbl">🔍</span>
                <input type="text" id="contactSearch" placeholder="Поиск...">
                <button id="clearSearch" class="btn-icon" style="display:none;font-size:12px;opacity:.5">✕</button>
            </div>

            <div id="contactsList" class="contacts-list"></div>
        </aside>

        <!-- ===== CHAT AREA ===== -->
        <main class="chat-area">

            <!-- Chat Header -->
            <header class="chat-header">
                <div id="noChatSelected" class="no-chat-msg">
                    <div class="no-chat-icon">💬</div>
                    <p>Выберите чат слева</p>
                </div>
                <div id="activeChatInfo" class="active-chat-info" style="display:none">
                    <div class="chat-user">
                        <div class="avatar-wrap">
                            <img id="activeChatAvatar" src="" class="avatar" alt="">
                            <span id="activeChatDot" class="online-dot" style="display:none"></span>
                        </div>
                        <div class="chat-user-details">
                            <span id="activeChatName" class="chat-name"></span>
                            <span id="activeChatStatus" class="chat-status online">В сети</span>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button id="searchInChatBtn" class="btn-icon" title="Поиск в чате">🔍</button>
                        <button id="deleteChatBtn" class="btn-icon btn-danger" title="Очистить чат">🗑️</button>
                    </div>
                </div>
            </header>

            <!-- Search in chat bar -->
            <div id="chatSearchBar" class="chat-search-bar" style="display:none">
                <span class="search-icon-lbl" style="font-size:14px">🔍</span>
                <input type="text" id="chatSearchInput" placeholder="Поиск в переписке...">
                <span id="chatSearchCount" class="search-count"></span>
                <button id="chatSearchPrev" class="btn-icon nav-btn">⬆</button>
                <button id="chatSearchNext" class="btn-icon nav-btn">⬇</button>
                <button id="closeChatSearch" class="btn-icon" style="font-size:12px">✕</button>
            </div>

            <!-- Pinned Message -->
            <div id="pinnedBar" class="pinned-bar" style="display:none">
                <div class="pin-left">📌</div>
                <div class="pin-content">
                    <span class="pin-label">Закреплённое сообщение</span>
                    <span id="pinnedText" class="pin-text"></span>
                </div>
                <button id="unpinBtn" class="btn-icon" style="font-size:13px;opacity:.5">✕</button>
            </div>

            <!-- Messages -->
            <div id="messagesArea" class="messages-area">
                <div class="start-placeholder">
                    <div class="start-icon">☁️</div>
                    <p>Cloud Messenger</p>
                    <span>Выберите собеседника слева</span>
                </div>
            </div>

            <!-- Scroll to bottom -->
            <button id="scrollBottomBtn" class="scroll-btn" style="display:none">
                ↓
                <span id="newMsgBadge" class="new-msg-badge" style="display:none">0</span>
            </button>

            <!-- Reply Preview -->
            <div id="replyPreview" class="reply-preview" style="display:none">
                <div class="reply-accent-bar"></div>
                <div class="reply-preview-content">
                    <span id="replyAuthorName" class="reply-author"></span>
                    <span id="replyTextPreview" class="reply-text"></span>
                </div>
                <button id="closeReplyBtn" class="btn-icon" style="font-size:13px;opacity:.5">✕</button>
            </div>

            <!-- Input Area -->
            <div class="message-input-area" id="messageInputArea" style="opacity:.5;pointer-events:none">
                <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt,.zip,.rar,.mp4,.mov" style="display:none">
                <button class="btn-icon attach-btn" id="attachBtn" title="Прикрепить">📎</button>
                <button class="btn-icon emoji-trigger-btn" id="emojiTriggerBtn" title="Эмодзи">😊</button>
                <input type="text" id="messageInput" placeholder="Написать сообщение..." autocomplete="off">
                <button class="btn-icon voice-btn" id="voiceBtn" title="Голосовое">🎤</button>
                <button id="sendBtn" class="btn-icon send-btn" style="display:none" title="Отправить">➤</button>
            </div>

        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
