<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>Cloud Messenger</h2>
            <p>Войдите, чтобы начать общение</p>
            <button id="loginBtn" class="btn-primary" style="width: 100%; margin-bottom: 10px;">Войти через Google</button>
            <button id="guestBtn" class="btn-secondary" style="width: 100%;">Войти как Гость</button>
        </div>
    </div>

    <div id="appScreen" class="app-container" style="display: none;">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <img id="myAvatar" src="" alt="Мой аватар" class="avatar">
                <div class="my-info">
                    <span id="myName" class="my-name">Загрузка...</span>
                </div>
                <button id="logoutBtn" class="btn-icon" title="Выйти">🚪</button>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Поиск контактов..." disabled>
            </div>

            <div id="contactsList" class="contacts-list">
                </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div id="activeChatInfo" class="active-chat-info" style="display: none;">
                    <img id="activeChatAvatar" src="" alt="Аватар" class="avatar">
                    <div class="active-chat-details">
                        <span id="activeChatName" class="active-chat-name">Имя собеседника</span>
                        <span class="online-status">В сети</span>
                    </div>
                </div>
                <div id="noChatSelected" class="no-chat-selected">
                    Выберите контакт слева для начала общения
                </div>
            </header>

            <div id="messagesArea" class="messages-area">
                <div class="empty-chat-placeholder">Здесь пока ничего нет. Напишите первым!</div>
            </div>

            <div class="message-input-area" id="messageInputArea" style="opacity: 0.5; pointer-events: none;">
                <button class="btn-icon attach-btn">📎</button>
                <input type="text" id="messageInput" placeholder="Написать сообщение...">
                <button id="sendBtn" class="btn-icon send-btn">➤</button>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
